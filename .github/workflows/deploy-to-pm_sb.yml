name: Deploy to PM_SB on Merge

on:
  push:
    branches:
      - dev2Branch

jobs:
  deploy-to-pm_sb:
    runs-on: ubuntu-latest
    steps:
    - name: 📦 Checkout repository
      uses: actions/checkout@v3

    - name: 🛠️ Install Salesforce CLI
      run: |
        npm install sfdx-cli --global
        sfdx --version

    - name: 🔐 Authenticate to PM_SB using Auth URL
      run: |
        echo "${{ secrets.PM_SB_AUTH_URL }}" > auth.txt
        sfdx force:auth:sfdxurl:store -f auth.txt -a PM_SB
        sfdx force:org:list
      shell: bash

    - name: ✅ Validate Metadata (Run Apex Tests)
      if: contains(github.event.head_commit.message, 'development-changes') && contains(github.event.head_commit.message, 'development-changes-next-step')
      run: |
        sfdx force:source:deploy -u PM_SB -p force-app --checkonly --testlevel RunLocalTests --json --loglevel fatal

    - name: 🚀 Deploy Metadata to PM_SB (if validation passed)
      if: success()
      run: |
        sfdx force:source:deploy -u PM_SB -p force-app --json --loglevel fatal
