<template>
    <lightning-card title="Upload File Document">
        <table class="slds-table slds-table_bordered slds-table_cell-buffer">
            <thead>
                <tr>
                    <th>Sr No.</th>
                    <th>Is Uploaded</th>
                    <th>Document Name</th>
                    <th>File Name</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <template for:each={fulloptions} for:item="doc">
                    <tr key={doc.label}>
                        <td>{doc.serial}</td>
                        <td>
                            <lightning-input type="checkbox" checked={doc.checked} disabled></lightning-input>
                        </td>
                        <td>{doc.label}</td>
                        <td>{doc.fileName}</td>
                        <td>
                            <label style="cursor: pointer;">
                                <lightning-icon 
                                    icon-name="utility:upload"
                                    alternative-text="Upload"
                                    title="Upload File"
                                    size="small"
                                    class="slds-m-right_small"
                                    data-label={doc.label}
                                    data-disabled={doc.disableUpload}
                                    onclick={handleUploadIconClick}
                                ></lightning-icon>

                                <template if:false={doc.disableUpload}>
                                    <lightning-file-upload
                                        name="fileUploader"
                                        record-id={recordId}
                                        accept=".pdf,.png,.jpg,.docx,.doc"
                                        onuploadfinished={handleLightningFileUpload}
                                        data-label={doc.label}
                                        style="opacity: 0; width: 1px; height: 1px; position: absolute;"
                                    ></lightning-file-upload>
                                </template>
                            </label>
                           
                            <template if:true={doc.checked}>
                                <lightning-icon 
                                    icon-name="utility:preview" 
                                    alternative-text="Preview"
                                    title="Preview"
                                    class="preview-icon slds-m-left_small"
                                    style="cursor: pointer;"
                                    data-version-id={doc.contentVersionId}
                                    onclick={handlePreview}
                                    size="small"
                                ></lightning-icon>
                            </template>
                        </td>
                    </tr>
                </template>
            </tbody>
        </table>
    </lightning-card>

    <!-- Modal Preview -->
    <template if:true={isModalOpen}>
        <section role="dialog" tabindex="-1" class="slds-modal slds-fade-in-open">
            <div class="slds-modal__container">
                <!-- Modal Header -->
                <header class="slds-modal__header">
                    <button class="slds-button slds-modal__close" title="Close" onclick={closeModal}>
                        <lightning-icon icon-name="utility:close" alternative-text="Close" size="small"></lightning-icon>
                    </button>
                    <h2 class="slds-text-heading_medium">File Preview</h2>
                </header>

                <!-- Modal Body -->
                <div class="slds-modal__content slds-p-around_medium" style="min-height:400px">    
                    <template if:true={previewFileUrl}>
                        <template if:true={isImageFile}>
                            <img src={previewFileUrl} alt="Preview" style="max-width: 100%; max-height: 100%;" />
                        </template>
                        <template if:true={isPdfFile}>
                            <iframe src={previewFileUrl} width="100%" height="500px"></iframe>
                        </template>
                    </template>
                </div>

                <!-- Modal Footer -->
                <footer class="slds-modal__footer">
                    <button class="slds-button slds-button_neutral" style="margin-right: 10px;" onclick={closeModal}>Close</button>
                    <lightning-button 
                        label="Download" 
                        title="Download File" 
                        onclick={downloadPreviewFile} 
                        variant="brand"
                    >
                    </lightning-button>
                </footer>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>

    <!-- Loading Spinner -->
    <template if:true={isLoading}>
        <div class="exampleHolder">
            <lightning-spinner alternative-text="Loading" size="medium"></lightning-spinner>
        </div>
    </template>
</template>
