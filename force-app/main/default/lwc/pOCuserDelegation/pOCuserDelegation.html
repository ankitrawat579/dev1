<template>
    <lightning-card>
        <div class="slds-grid slds-p-horizontal_medium slds-p-vertical_small"> 
            <lightning-input
                type="radio"
                name="accessOptions"
                label="My Delegated Access"
                value="myDelegated"
                checked={isMyDelegatedSelected}
                onchange={handleOptionChange}>
            </lightning-input>

            <lightning-input
                type="radio"
                name="accessOptions"
                label="Submit Delegation Access"
                value="submitDelegation"
                checked={isSubmitDelegationSelected}
                onchange={handleOptionChange}
                disabled={disableSubmitDelegation}>
            </lightning-input>
        </div>

        <!-- My Delegated Access Table -->
        <template if:true={showMyDelegatedAccess}>
            <div class="slds-box slds-m-around_medium">
                    <lightning-datatable
                        key-field="id"
                        data={tableData}
                        columns={columns}
                        hide-checkbox-column={hideCheckbox}
                        >
                    </lightning-datatable>
            </div>
        </template>

        <!-- Submit Delegation Access UI -->
        <template if:true={showSubmitDelegation}>
            <div class="slds-m-around_medium slds-g-sizing-border-1">
                <div class="slds-box" style="border-radius: 20px;">
                    <!-- Delegation Request Form -->
                    <div class="slds-grid slds-wrap slds-gutters">
                        <div class="slds-col slds-size_1-of-1 slds-m-bottom_small">
                            <lightning-radio-group
                                name="requestFor"
                                label="Request For"
                                options={requestForOptions}
                                value={requestFor}
                                type="radio"
                                onchange={handleRequestForChange}
                                >
                            </lightning-radio-group>
                        </div>
                        <div class="slds-col slds-size_1-of-2">
                            <div class="lookup-wrapper">
                                <lightning-input 
                                    label="Clone Persona from" 
                                    type="search" 
                                    value={searchCloneFromKey} 
                                    disabled={isDisabled} 
                                    onchange={handleSearch}>
                                </lightning-input>

                                <template if:true={showLookupDropdown}>
                                    <ul class="custom-lookup-dropdown" role="listbox">
                                        <template for:each={filteredUsers} for:item="user">
                                            <li 
                                                key={user.Id} 
                                                class="slds-listbox__item" 
                                                role="presentation"
                                                onclick={handleCloneFromSelect} 
                                                data-id={user.Id} 
                                                data-name={user.Name}>
                                                <div class="slds-listbox__option slds-listbox__option_plain slds-media slds-media_small" role="option">
                                                    <span class="slds-media__body">
                                                        <span class="slds-truncate">{user.Name}</span>
                                                    </span>
                                                </div>
                                            </li>
                                        </template>
                                    </ul>
                                </template>
                            </div>
                        </div>

                        <div class="slds-col slds-size_1-of-2">
                            <div class="lookup-wrapper">
                                <lightning-input
                                label="Clone to" 
                                type="search" 
                                value={searchCloneToKey} 
                                onchange={handleFormInputChange}>
                                </lightning-input>

                                <template if:true={showLookupCloneTo}>
                                    <ul class="custom-lookup-dropdown" role="listbox">
                                        <template for:each={filteredCloneToUsers} for:item="user">
                                            <li 
                                                key={user.Id} 
                                                class="slds-listbox__item" 
                                                role="presentation"
                                                onclick={handleCloneToSelect} 
                                                data-id={user.Id} 
                                                data-name={user.Name}>
                                                <div class="slds-listbox__option slds-listbox__option_plain slds-media slds-media_small" role="option">
                                                    <span class="slds-media__body">
                                                        <span class="slds-truncate">{user.Name}</span>
                                                    </span>
                                                </div>
                                            </li>
                                        </template>
                                    </ul>
                                </template>
                            </div>
                        </div>
                        <div class="slds-col slds-size_1-of-2">
                            <lightning-input label="Effective Date" type="date" onchange={handleFormInputChange}></lightning-input>
                        </div>
                        <div class="slds-col slds-size_1-of-2">
                            <lightning-input label="End Date" type="date" onchange={handleFormInputChange}></lightning-input>
                        </div>
                        <!-- <div class="slds-col slds-size_1-of-1 slds-m-top_small"> -->
                        <div class="slds-align_absolute-center">
                            <lightning-button
                             variant="brand" 
                             label="Preview"
                             style="margin-top: 20px;"
                             onclick={handlePreivew}></lightning-button>
                        </div>
                    </div>
                </div>
                </br>
                <template if:true={showDetail}>
                    <div class="slds-box" style="border-radius: 20px;">
                        <!-- Preview Table -->
                        <div class="slds-m-top_medium">
                            <lightning-datatable
                                key-field="id"
                                data={previewData}
                                columns={previewColumns}
                                hide-checkbox-column>
                            </lightning-datatable>
                            <div class="slds-align_absolute-center"> 
                                <lightning-button variant="brand" label="Submit" style="margin-top: 20px;"></lightning-button>
                            </div>
                        </div>
                    </div>
                    </template>
                <br>
                <div class="slds-box slds-g-sizing-border-1">
                    <!-- <div style="border-radius: 20px;"> -->
                    <!-- Delegation History Table -->
                        <div class="slds-m-top_large">
                            <h3 class="slds-text-heading_small slds-m-bottom_x-small">Delegation History</h3>
                            <lightning-datatable
                                key-field="id"
                                data={historyData}
                                columns={historyColumns}
                                hide-checkbox-column>
                            </lightning-datatable>
                        </div>
                    <!-- </div> -->
                </div>
            </div>
        </template>
    </lightning-card>
</template>
