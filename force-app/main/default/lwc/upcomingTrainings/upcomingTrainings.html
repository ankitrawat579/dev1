<template>

    <lightning-card title="Upcoming Trainings" class="slds-scrollable">

        <lightning-datatable key-field="Id" columns={columns} data={data} onrowaction={handleRowAction}
            hide-checkbox-column>
        </lightning-datatable>

        <template if:false={data.length}>
            <div class="slds-p-around_small">
                No Upcoming Trainings Found.
            </div>
        </template>

    </lightning-card>

</template>
