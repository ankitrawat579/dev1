<template>
    <lightning-card>

        <template if:true={isLoading}>
            <lightning-spinner
                alternative-text="Uploading..."
                size="medium"
                variant="brand"
            ></lightning-spinner>
        </template>


        <lightning-button
            label="Upload CV"
            onclick={triggerFileInput}
            class="slds-m-bottom_small"
        ></lightning-button>


        <input
            type="file"
            accept=".pdf,.doc,.docx,.png"
            onchange={handleFileChange}
            style="display: none"
            class="fileInput"
        />
    </lightning-card>
</template>
